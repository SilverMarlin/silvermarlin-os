.wrap{max-width:1180px;margin:0 auto;padding:28px}
header{display:flex;align-items:center;gap:24px;margin:20px 0 38px}
.logo{width:180px;background:white;border-radius:18px;padding:12px}
h1{font-size:54px;letter-spacing:4px;margin:0;text-shadow:0 4px 20px #000}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}

dialog{width:min(720px,92vw);border:1px solid rgba(132,221,255,.6);border-radius:24px;background:#061827;color:white;padding:30px;box-shadow:0 20px 80px rgba(0,0,0,.65)}
dialog::backdrop{background:rgba(0,0,0,.65)}
.close{float:right;width:44px;height:44px;border:0;border-radius:50%;font-size:30px;background:#12344d;color:white}
.modalText{font-size:24px;line-height:1.65}
